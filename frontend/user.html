<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>VPN Аккаунт</title>
<style>
/* ─── ТОКЕНЫ (идентичны index.html) ────────────────────────────────────────── */
:root {
  --s0: #07101f;  --s1: #0b1628;  --s2: #0f1d33;
  --s3: #132240;  --s4: #162847;
  --bd:  rgba(255,255,255,.07);
  --bd2: rgba(255,255,255,.12);
  --a:    #5271e8;  --a-hv: #4060d4;
  --a-bg: rgba(82,113,232,.11);
  --a-ri: rgba(82,113,232,.28);
  --a-tx: #7b9af4;
  --gn:    #1fc96a;
  --gn-bg: rgba(31,201,106,.09);
  --gn-ri: rgba(31,201,106,.25);
  --gn-tx: #3fb87a;
  --am:    #f59e0b;
  --am-bg: rgba(245,158,11,.1);
  --rd:    #e55e5e;
  --rd-bg: rgba(229,94,94,.10);
  --rd-ri: rgba(229,94,94,.26);
  --t1: #cfd9ee;  --t2: #5c738f;  --t3: #293d54;
  --r1:6px;  --r2:9px;  --r3:12px;  --r4:16px;
  --tf: 160ms cubic-bezier(.2,0,.13,1);
  --tm: 240ms cubic-bezier(.2,0,.13,1);
  --safe-b: env(safe-area-inset-bottom,0px);
  --safe-l: env(safe-area-inset-left,0px);
  --safe-r: env(safe-area-inset-right,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
  background:var(--s0);min-height:100vh;min-height:100dvh;
  color:var(--t1);line-height:1.5;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
.hidden{display:none!important}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* ─── КНОПКИ ────────────────────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 16px;font-size:13.5px;font-weight:500;line-height:1;letter-spacing:.01em;
  border:1px solid transparent;border-radius:var(--r2);
  cursor:pointer;text-decoration:none;white-space:nowrap;
  background:none;color:inherit;user-select:none;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  transition:background var(--tf),border-color var(--tf),color var(--tf),transform var(--tf);
}
.btn:active:not(:disabled){transform:scale(.95)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-primary{background:var(--a);color:#fff;box-shadow:0 1px 6px rgba(82,113,232,.28),inset 0 1px 0 rgba(255,255,255,.12)}
.btn-primary:hover:not(:disabled){background:var(--a-hv)}
.btn-secondary{background:var(--s2);color:var(--t1);border-color:var(--bd)}
.btn-secondary:hover:not(:disabled){background:var(--s3);border-color:var(--bd2)}
.btn-ghost{background:transparent;color:var(--t2)}
.btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.05);color:var(--t1)}
.btn-danger{color:var(--rd);border-color:rgba(229,94,94,.22)}
.btn-danger:hover:not(:disabled){background:var(--rd-bg);border-color:var(--rd-ri)}
.btn-sm{padding:6px 13px;font-size:13px}
.btn-xs{padding:5px 10px;font-size:12px}

/* ─── ШАПКА ─────────────────────────────────────────────────────────────────── */
.header{
  position:sticky;top:0;z-index:50;height:54px;
  background:rgba(7,16,31,.9);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  padding-left:calc(24px + var(--safe-l));
  padding-right:calc(24px + var(--safe-r));
  gap:12px;
}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-mark{
  width:30px;height:30px;flex-shrink:0;
  background:var(--a-bg);border:1px solid rgba(82,113,232,.25);border-radius:var(--r2);
  display:flex;align-items:center;justify-content:center;color:var(--a-tx);
}
.logo-title{font-size:14.5px;font-weight:650;color:var(--t1);letter-spacing:-.3px}
.header-user{font-size:13px;font-weight:500;color:var(--t2)}

/* ─── КОНТЕЙНЕР ─────────────────────────────────────────────────────────────── */
.main{
  max-width:680px;margin:0 auto;
  padding:clamp(20px,4vw,36px) clamp(14px,3vw,20px) clamp(56px,8vw,96px);
  padding-left:max(clamp(14px,3vw,20px),var(--safe-l));
  padding-right:max(clamp(14px,3vw,20px),var(--safe-r));
}

/* ─── СТАТУС ПОДПИСКИ ────────────────────────────────────────────────────────── */
.sub-card{
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--r4);
  padding:22px 24px;margin-bottom:14px;
  display:flex;align-items:flex-start;gap:16px;
}
.sub-icon{
  width:42px;height:42px;border-radius:var(--r3);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.sub-icon.si-ok {background:var(--gn-bg);border:1px solid var(--gn-ri);color:var(--gn-tx)}
.sub-icon.si-exp{background:var(--rd-bg);border:1px solid var(--rd-ri);color:var(--rd)}
.sub-icon.si-off{background:rgba(255,255,255,.05);border:1px solid var(--bd);color:var(--t3)}
.sub-body{flex:1;min-width:0}
.sub-name{font-size:18px;font-weight:700;letter-spacing:-.4px;color:var(--t1);margin-bottom:4px}
.sub-badge-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.sub-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;
  font-size:12px;font-weight:600;white-space:nowrap;border:1px solid transparent;
}
.sb-unlimited{background:var(--a-bg);border-color:var(--a-ri);color:var(--a-tx)}
.sb-active   {background:var(--gn-bg);border-color:var(--gn-ri);color:var(--gn-tx)}
.sb-expired  {background:var(--rd-bg);border-color:var(--rd-ri);color:var(--rd)}
.sb-disabled {background:rgba(255,255,255,.06);border-color:var(--bd);color:var(--t2)}
.sub-detail{font-size:13px;color:var(--t2);margin-bottom:4px}
.sub-remaining{font-size:12.5px;color:var(--t3)}
.sub-remaining.rem-ok{color:var(--gn-tx)}
.sub-remaining.rem-warn{color:var(--am)}
.sub-remaining.rem-bad{color:var(--rd)}

.sub-alert{
  border-radius:var(--r2);padding:12px 16px;margin-bottom:14px;
  font-size:13px;display:flex;align-items:center;gap:9px;
}
.sub-alert.alert-disabled{background:var(--rd-bg);border:1px solid var(--rd-ri);color:var(--rd)}
.sub-alert.alert-expired {background:var(--am-bg);border:1px solid rgba(245,158,11,.28);color:#f59e0b}

/* ─── ТРАФИК ─────────────────────────────────────────────────────────────────── */
.traffic-card{
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);
  padding:16px 20px;margin-bottom:14px;
  display:flex;align-items:center;gap:14px;
}
.traffic-icon{color:var(--t2);flex-shrink:0;display:flex;align-items:center}
.traffic-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t2);margin-bottom:4px}
.traffic-vals{display:flex;gap:18px;flex-wrap:wrap}
.traffic-val{font-size:13px;font-weight:600;color:var(--t1);font-family:"SF Mono","JetBrains Mono",ui-monospace,monospace}
.traffic-total{color:var(--t2)}

/* ─── УСТРОЙСТВА ─────────────────────────────────────────────────────────────── */
.section-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.section-bar h2{font-size:16px;font-weight:700;letter-spacing:-.3px}
.devices-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.device-item{
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  transition:border-color var(--tm);
}
.device-item:hover{border-color:var(--bd2)}
.device-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.dev-dot{width:8px;height:8px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:background .3s}
.dev-dot.online{background:var(--gn);box-shadow:0 0 0 2.5px rgba(31,201,106,.2);animation:dot-pulse 2.5s ease-in-out infinite}
.dev-dot.recent{background:var(--am)}
@keyframes dot-pulse{0%,100%{opacity:1}50%{opacity:.5}}
.device-icon{
  width:34px;height:34px;border-radius:var(--r1);flex-shrink:0;
  background:var(--a-bg);border:1px solid rgba(82,113,232,.18);
  color:var(--a-tx);display:flex;align-items:center;justify-content:center;
}
.device-info{min-width:0}
.device-name{font-size:13.5px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.device-sub{font-size:11.5px;color:var(--t2);margin-top:2px;display:flex;align-items:baseline;flex-wrap:wrap;gap:0}
.device-ip{font-family:"SF Mono","JetBrains Mono",ui-monospace,monospace;letter-spacing:.01em}
.device-age:not(:empty)::before{content:' · ';color:var(--t3)}
.device-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.empty-devices{text-align:center;padding:28px 20px;font-size:13px;color:var(--t3);background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3)}

/* ─── ДОБАВИТЬ УСТРОЙСТВО ────────────────────────────────────────────────────── */
.add-device-wrap{margin-bottom:14px}
.add-device-form{
  background:var(--s1);border:1px solid var(--a-ri);border-radius:var(--r3);
  padding:16px;display:flex;gap:8px;align-items:center;
}
.add-device-form input{
  flex:1;padding:9px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);
  font-size:14px;color:var(--t1);outline:none;-webkit-appearance:none;appearance:none;
  transition:border-color var(--tf),box-shadow var(--tf);
}
.add-device-form input::placeholder{color:var(--t3)}
.add-device-form input:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--a-ri)}


/* ─── УВЕДОМЛЕНИЯ ────────────────────────────────────────────────────────────── */
.toast-container{position:fixed;bottom:calc(20px + var(--safe-b));right:16px;z-index:200;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{display:flex;align-items:center;gap:9px;padding:11px 15px;border-radius:var(--r2);font-size:13px;font-weight:500;min-width:180px;max-width:300px;animation:toast-in .2s cubic-bezier(.22,1,.36,1);background:var(--s4);border:1px solid var(--bd2);color:var(--t1);box-shadow:0 8px 28px rgba(0,0,0,.45)}
.toast.success{background:rgba(31,201,106,.1);border-color:var(--gn-ri);color:#4ece8e}
.toast.error  {background:rgba(229,94,94,.1); border-color:var(--rd-ri);color:#e87c7c}
@keyframes toast-in{from{opacity:0;transform:translateX(14px) scale(.97)}}

/* ─── ФУТЕР ──────────────────────────────────────────────────────────────────── */
.support-section{
  margin-top:40px;padding:20px;
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);
  text-align:center;
}
.support-section h3{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:6px}
.support-section p{font-size:12.5px;color:var(--t2);line-height:1.55}

/* ─── LOADING / ERROR ────────────────────────────────────────────────────────── */
.full-center{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
.full-center-box{text-align:center;max-width:320px}
.full-center-box h2{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:8px}
.full-center-box p{font-size:13.5px;color:var(--t2)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
  .header{padding:0 16px}
  .main{padding:20px 14px 72px}
  .sub-card{padding:16px}
  .device-item{padding:12px 14px}
  .device-actions{flex-direction:column;gap:4px}
  .device-actions .btn{width:100%;justify-content:center}
  .modal{align-items:flex-end;padding:0}
  .modal-box{width:100%;max-width:100%;border-radius:var(--r4) var(--r4) 0 0;border:none;border-top:1px solid var(--bd2);padding:24px 20px calc(24px + var(--safe-b));animation:sheet-up .28s cubic-bezier(.22,1,.36,1)}
  @keyframes sheet-up{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
  .modal-box::before{content:'';display:block;width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 20px}
}
</style>
</head>
<body>

<div class="toast-container" id="toasts"></div>

<!-- ─── ЗАГРУЗКА ──────────────────────────────────────────────────────────────── -->
<div id="loading-view" class="full-center">
  <div class="full-center-box">
    <div class="spinner"></div>
    <p>Загрузка…</p>
  </div>
</div>

<!-- ─── ОШИБКА (неверный токен) ──────────────────────────────────────────────── -->
<div id="error-view" class="full-center hidden">
  <div class="full-center-box">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:14px">
      <circle cx="12" cy="12" r="10"/>
      <line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    <h2>Ссылка недействительна</h2>
    <p>Ссылка устарела или не существует. Обратитесь к администратору.</p>
  </div>
</div>

<!-- ─── ОСНОВНОЙ КОНТЕНТ ───────────────────────────────────────────────────────── -->
<div id="main-view" class="hidden">

  <header class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <span class="logo-title">VPN Аккаунт</span>
    </div>
    <span class="header-user" id="hdr-username"></span>
  </header>

  <main class="main">

    <!-- Статус подписки -->
    <div id="sub-alert" class="sub-alert hidden"></div>

    <div class="sub-card" id="sub-card">
      <div class="sub-icon" id="sub-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="sub-body">
        <div class="sub-name" id="sub-username">—</div>
        <div class="sub-badge-row">
          <span class="sub-badge" id="sub-badge">—</span>
        </div>
        <div class="sub-detail" id="sub-detail"></div>
        <div class="sub-remaining" id="sub-remaining"></div>
      </div>
    </div>

    <!-- Трафик -->
    <div class="traffic-card">
      <span class="traffic-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="8 17 12 21 16 17"/><line x1="12" y1="21" x2="12" y2="12"/>
          <polyline points="16 7 12 3 8 7"/><line x1="12" y1="3" x2="12" y2="12"/>
        </svg>
      </span>
      <div>
        <div class="traffic-lbl">Трафик</div>
        <div class="traffic-vals">
          <span class="traffic-val" id="trf-rx">↓ —</span>
          <span class="traffic-val" id="trf-tx">↑ —</span>
          <span class="traffic-val traffic-total" id="trf-total">Всего: —</span>
        </div>
      </div>
    </div>

    <!-- Устройства -->
    <div class="section-bar">
      <h2>Устройства</h2>
    </div>

    <div class="devices-list" id="devices-list">
      <div class="empty-devices">Нет устройств</div>
    </div>

    <!-- Добавить устройство -->
    <div class="add-device-wrap" id="add-device-wrap">
      <button class="btn btn-primary btn-sm" id="add-device-btn" style="width:100%;min-height:40px">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Добавить устройство
      </button>
      <div id="add-device-form" class="add-device-form hidden" style="margin-top:8px">
        <input type="text" id="new-device-name" placeholder="например, телефон" autocomplete="off" spellcheck="false" maxlength="32">
        <button class="btn btn-primary btn-sm" id="add-device-confirm">Создать</button>
        <button class="btn btn-ghost btn-sm" id="add-device-cancel">✕</button>
      </div>
    </div>

    <!-- Поддержать сервер -->
    <div class="support-section">
      <h3>Поддержать сервер</h3>
      <p>Если срок подходит к концу — свяжитесь с администратором для продления.</p>
    </div>

  </main>
</div>


<script>
"use strict";

const API    = "/api/public";
const _token = location.pathname.split("/u/")[1] || "";

/* ── Утилиты ─────────────────────────────────────────────────────────────────── */
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function $(id){ return document.getElementById(id); }
function show(id){ $(id).classList.remove("hidden"); }
function hide(id){ $(id).classList.add("hidden"); }

function _fmtBytes(b){
  if(!b||b<=0) return "0 Б";
  if(b<1024)       return b+" Б";
  if(b<1048576)    return (b/1024).toFixed(1)+" КБ";
  if(b<1073741824) return (b/1048576).toFixed(1)+" МБ";
  return (b/1073741824).toFixed(2)+" ГБ";
}

function _fmtAge(s){
  if(s==null) return "";
  if(s<60)    return s+" сек";
  if(s<3600)  return Math.floor(s/60)+" мин";
  if(s<86400) return Math.floor(s/3600)+" ч";
  return Math.floor(s/86400)+" дн";
}

function _fmtDate(ts){
  if(!ts) return "";
  return new Date(ts*1000).toLocaleDateString("ru-RU",{day:"numeric",month:"long",year:"numeric"});
}

function toast(msg, type=""){
  const c=$("toasts"), el=document.createElement("div");
  el.className="toast"+(type?" "+type:""); el.textContent=msg;
  c.appendChild(el);
  setTimeout(()=>{ el.style.animation="toast-in .2s reverse"; setTimeout(()=>el.remove(),200); },3200);
}

/* ── API ─────────────────────────────────────────────────────────────────────── */
async function apiFetch(method, path, body=null){
  const opts={method,headers:{"Content-Type":"application/json"}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(API+"/"+_token+path, opts);
  if(r.status===404) throw Object.assign(new Error("not_found"),{status:404});
  if(!r.ok){
    let msg="Ошибка";
    try{const j=await r.json(); msg=j.error||j.detail||msg;}catch{}
    throw new Error(msg);
  }
  return r;
}

async function apiJson(method, path, body=null){
  const r=await apiFetch(method, path, body);
  if(r.status===204) return null;
  const j=await r.json();
  return j.data!==undefined?j.data:j;
}

/* ── Состояние ───────────────────────────────────────────────────────────────── */
let _userData    = null;
let _subStatus   = "unlimited";

/* ── Подписка ────────────────────────────────────────────────────────────────── */
function _renderSub(data){
  _subStatus = data.sub_status || "unlimited";
  const sub  = data.subscription || {};
  const name = data.username;

  $("hdr-username").textContent = name;
  $("sub-username").textContent = name;

  // Icon & badge
  const iconEl = $("sub-icon");
  const badge  = $("sub-badge");
  let iconCls, badgeCls, badgeTxt;

  if(_subStatus==="unlimited"){
    iconCls="si-ok"; badgeCls="sb-unlimited"; badgeTxt="∞ Безлимит";
  } else if(_subStatus==="active"){
    iconCls="si-ok"; badgeCls="sb-active"; badgeTxt="Активна";
  } else if(_subStatus==="expired"){
    iconCls="si-exp"; badgeCls="sb-expired"; badgeTxt="Истёк";
  } else {
    iconCls="si-off"; badgeCls="sb-disabled"; badgeTxt="Отключён";
  }

  iconEl.className="sub-icon "+iconCls;
  badge.className="sub-badge "+badgeCls;
  badge.textContent=badgeTxt;

  // Detail (period info)
  const detailEl=document.getElementById("sub-detail");
  const remEl=document.getElementById("sub-remaining");
  const now=Math.floor(Date.now()/1000);

  if(_subStatus==="unlimited"){
    detailEl.textContent="Безлимитный доступ";
    remEl.textContent="";
    remEl.className="sub-remaining";
  } else if(_subStatus==="disabled"){
    detailEl.textContent="Доступ отключён администратором";
    remEl.textContent="";
    remEl.className="sub-remaining";
  } else if(_subStatus==="active"){
    const exp=sub.expires_at||0;
    detailEl.textContent="Действует до "+_fmtDate(exp);
    const days=Math.ceil((exp-now)/86400);
    let remCls="sub-remaining rem-ok", remTxt;
    if(days<=0)        { remTxt="Сегодня последний день"; remCls="sub-remaining rem-warn"; }
    else if(days===1)  { remTxt="Осталось 1 день"; remCls="sub-remaining rem-warn"; }
    else if(days<=7)   { remTxt="Осталось "+days+" дн"; remCls="sub-remaining rem-warn"; }
    else               { remTxt="Осталось "+days+" дн"; }
    remEl.textContent=remTxt; remEl.className=remCls;
  } else { // expired
    const exp=sub.expires_at||0;
    detailEl.textContent="Срок истёк "+_fmtDate(exp);
    const days=Math.floor((now-exp)/86400);
    remEl.textContent=days>0?"Истекло "+days+" дн назад":"Истёк сегодня";
    remEl.className="sub-remaining rem-bad";
  }

  // Alert banner
  const alertEl=$("sub-alert");
  if(_subStatus==="disabled"){
    alertEl.className="sub-alert alert-disabled";
    alertEl.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Доступ временно отключён администратором.';
    show("sub-alert");
  } else if(_subStatus==="expired"){
    alertEl.className="sub-alert alert-expired";
    alertEl.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Срок доступа истёк. Свяжитесь с администратором.';
    show("sub-alert");
  } else {
    hide("sub-alert");
  }

  // Add device button visibility
  const allowed = _subStatus==="unlimited" || _subStatus==="active";
  if(allowed) show("add-device-wrap"); else hide("add-device-wrap");
}

/* ── Трафик ──────────────────────────────────────────────────────────────────── */
function _renderTraffic(stats){
  const rx=stats?.total_rx||0, tx=stats?.total_tx||0, total=rx+tx;
  $("trf-rx").textContent="↓ "+_fmtBytes(rx);
  $("trf-tx").textContent="↑ "+_fmtBytes(tx);
  $("trf-total").textContent="Всего: "+_fmtBytes(total);
}

/* ── Устройства ──────────────────────────────────────────────────────────────── */
function _renderDevices(devices){
  const list=$("devices-list");
  if(!devices||!devices.length){
    list.innerHTML='<div class="empty-devices">Нет устройств. Нажмите «Добавить устройство».</div>';
    return;
  }
  const allowed = _subStatus==="unlimited" || _subStatus==="active";
  list.innerHTML=devices.map(d=>{
    const age=d.last_handshake_seconds!=null?_fmtAge(d.last_handshake_seconds):"";
    const dlBtn=allowed
      ?`<button class="btn btn-xs btn-secondary" data-act="dl" data-id="${esc(d.id)}" data-name="${esc(d.name)}" title="Скачать конфигурацию">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Конфиг</button>`
      :"";
    return `<div class="device-item">
      <div class="device-left">
        <div class="dev-dot ${d.status||"offline"}"></div>
        <div class="device-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        </div>
        <div class="device-info">
          <div class="device-name">${esc(d.name)}</div>
          <div class="device-sub">
            <span class="device-ip">${esc(d.ip)}</span>
            <span class="device-age">${esc(age)}</span>
          </div>
        </div>
      </div>
      <div class="device-actions">
        ${dlBtn}
        <button class="btn btn-xs btn-danger" data-act="del" data-id="${esc(d.id)}" data-name="${esc(d.name)}" style="padding:6px 8px" title="Удалить устройство">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`;
  }).join("");
}

/* ── Загрузка данных ─────────────────────────────────────────────────────────── */
async function _loadUser(){
  try{
    const data = await apiJson("GET","");
    _userData = data;
    hide("loading-view");
    show("main-view");
    _renderSub(data);
    _renderTraffic(data.stats);
    _renderDevices(data.devices);
  }catch(e){
    hide("loading-view");
    if(e.status===404) show("error-view");
    else {
      show("error-view");
      $("error-view").querySelector("h2").textContent="Ошибка загрузки";
      $("error-view").querySelector("p").textContent=e.message;
    }
  }
}

/* ── Скачать конфиг ──────────────────────────────────────────────────────────── */
async function _download(deviceId, deviceName){
  try{
    const r=await apiFetch("GET",`/devices/${encodeURIComponent(deviceId)}/config`);
    const blob=await r.blob(), url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url;
    a.download=`${_userData?.username||"vpn"}-${deviceName}.conf`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    toast("Конфиг скачан","success");
  }catch(e){ toast(e.message,"error"); }
}


/* ── Удалить устройство ──────────────────────────────────────────────────────── */
async function _deleteDevice(deviceId, deviceName, btn){
  if(!confirm(`Удалить устройство "${deviceName}"? Действие нельзя отменить.`)) return;
  const orig=btn.innerHTML;
  btn.disabled=true; btn.innerHTML='<span class="spinner" style="width:12px;height:12px;border-width:1.5px"></span>';
  try{
    await apiJson("DELETE",`/devices/${encodeURIComponent(deviceId)}`);
    toast("Устройство удалено","success");
    await _loadUser();
  }catch(e){ toast(e.message,"error"); btn.disabled=false; btn.innerHTML=orig; }
}

/* ── Добавить устройство ─────────────────────────────────────────────────────── */
function _openAddForm(){
  hide("add-device-btn");
  show("add-device-form");
  $("new-device-name").value="";
  $("new-device-name").focus();
}

function _closeAddForm(){
  show("add-device-btn");
  hide("add-device-form");
}

async function _submitDevice(){
  const name=$("new-device-name").value.trim().toLowerCase();
  if(!name){ toast("Введите название","error"); return; }
  const btn=$("add-device-confirm");
  btn.disabled=true;
  const orig=btn.innerHTML;
  btn.innerHTML='<span class="spinner" style="width:12px;height:12px;border-width:1.5px"></span>';
  try{
    const d=await apiJson("POST","/devices", {name});
    toast(`Устройство "${d.name}" создано`,"success");
    _closeAddForm();
    await _loadUser();
    // Автоматически предложить скачать конфиг нового устройства
    await _download(d.id, d.name);
  }catch(e){ toast(e.message,"error"); }
  finally{ btn.disabled=false; btn.innerHTML=orig; }
}

/* ── Делегирование событий ───────────────────────────────────────────────────── */
document.getElementById("devices-list").addEventListener("click",e=>{
  const dl=e.target.closest("[data-act='dl']");   if(dl){ _download(dl.dataset.id,dl.dataset.name); return; }
  const del=e.target.closest("[data-act='del']");  if(del){ _deleteDevice(del.dataset.id,del.dataset.name,del); return; }
});

$("add-device-btn").addEventListener("click", _openAddForm);
$("add-device-cancel").addEventListener("click", _closeAddForm);
$("add-device-confirm").addEventListener("click", _submitDevice);
$("new-device-name").addEventListener("keydown",e=>{ if(e.key==="Enter") _submitDevice(); if(e.key==="Escape") _closeAddForm(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") _closeAddForm(); });

/* ── Старт ───────────────────────────────────────────────────────────────────── */
if(!_token){ hide("loading-view"); show("error-view"); }
else _loadUser();
</script>
</body>
</html>
